name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-security-docker:
    name: Tests, SAST and Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install bandit

      - name: Run tests
        run: pytest

      - name: Run Bandit
        run: bandit -r todo_project -ll

      - name: Build Docker image
        run: docker build -t task-manager-flask .
